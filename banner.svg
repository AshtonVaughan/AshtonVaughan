  <text x="80" y="120" font-family="ui-monospace, 'JetBrains Mono', 'Fira Code', monospace" font-size="18" fill="#FF006E">$ offensive_security + ai_ml_systems</text>

  <text x="80" y="146" font-family="ui-monospace, 'JetBrains Mono', 'Fira Code', monospace" font-size="13" fill="#7d8590">IT @ QUT / Brisbane / hacking since I was 9</text>
