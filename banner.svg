  <rect width="1200" height="180" fill="url(#bg)"/>
  <rect width="1200" height="180" fill="url(#grid)"/>

  <rect x="0" y="0" width="1200" height="2" fill="url(#accent)"/>
  <rect x="0" y="178" width="1200" height="2" fill="url(#accent)"/>

