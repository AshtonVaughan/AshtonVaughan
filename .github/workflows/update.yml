name: update readme

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: regenerate recent section
        run: python scripts/update_recent.py
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "auto: refresh recent activity"
            git push
          fi
