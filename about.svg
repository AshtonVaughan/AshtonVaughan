      <g fill="#30363d"><rect x="120" y="0" width="14" height="14"/></g>
      <g fill="#161b22" stroke="#30363d" stroke-width="1"><rect x="140" y="0" width="14" height="14"/></g>
    </g>

    <text x="0" y="490" font-family="ui-monospace, monospace" font-size="14" fill="#FF006E" font-weight="700">$</text>
    <rect x="14" y="478" width="10" height="14" fill="#FF006E">
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
