<svg viewBox="0 0 1000 540" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="about Ashton Vaughan">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#21262d" stroke-width="1"/>
    </pattern>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FF006E"/>
      <stop offset="0.5" stop-color="#9D4EDD"/>
      <stop offset="1" stop-color="#00D9FF"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3"/></filter>
  </defs>

  <rect width="1000" height="540" fill="url(#bg)" rx="10"/>
  <rect width="1000" height="540" fill="url(#grid)" rx="10"/>

  <rect x="0" y="0" width="1000" height="2" fill="url(#accent)"/>
  <rect x="0" y="538" width="1000" height="2" fill="url(#accent)"/>

  <g transform="translate(0, 0)">
