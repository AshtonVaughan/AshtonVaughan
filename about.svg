      <text x="0" y="264"><tspan fill="#00D9FF" font-weight="600">SHIPPING</tspan>  ProjectTriage  <tspan fill="#7d8590">(71K LOC python)</tspan></text>
      <text x="0" y="288"><tspan fill="#00D9FF" font-weight="600">SHIPPING</tspan>  PrismLLM       <tspan fill="#7d8590">(rust · on pypi)</tspan></text>
      <text x="0" y="312"><tspan fill="#00D9FF" font-weight="600">SHIPPING</tspan>  AgentBrowser   <tspan fill="#7d8590">(ts · mcp server)</tspan></text>

      <text x="0" y="354"><tspan fill="#06FFA5" font-weight="600">OPEN</tspan>      security research · bug bounty</text>
      <text x="0" y="378"><tspan fill="#06FFA5" font-weight="600">OPEN</tspan>      interesting systems problems</text>
    </g>

    <g transform="translate(0, 408)">
